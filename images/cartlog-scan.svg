<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="scanBtnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#0a0f1e"/>

  <!-- Status bar -->
  <text x="30" y="26" font-family="SF Pro, -apple-system, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">9:41</text>
  <text x="345" y="26" text-anchor="end" font-family="SF Pro, -apple-system, sans-serif" font-size="12" fill="#64748b">100%</text>

  <!-- Header -->
  <text x="24" y="68" font-family="'DM Serif Display', Georgia, serif" font-size="22" fill="#f1f5f9">cart<tspan fill="#22d3ee">log</tspan></text>
  <!-- Status dot with glow -->
  <circle cx="351" cy="62" r="12" fill="url(#dotGlow)"/>
  <circle cx="351" cy="62" r="4" fill="#22d3ee"/>

  <!-- Title -->
  <text x="187" y="140" text-anchor="middle" font-family="'DM Serif Display', Georgia, serif" font-size="26" fill="#f1f5f9">Scan a Receipt</text>
  <text x="187" y="164" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#64748b">Tap the box or drag a photo in</text>

  <!-- Upload zone -->
  <rect x="48" y="200" width="280" height="320" rx="24" fill="#0f172a" stroke="#1e293b" stroke-width="2" stroke-dasharray="0"/>

  <!-- Receipt emoji -->
  <text x="188" y="340" text-anchor="middle" font-size="52">🧾</text>

  <!-- Upload text -->
  <text x="188" y="400" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="15" fill="#94a3b8" font-weight="500">Tap to scan</text>
  <text x="188" y="422" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#475569">or drag &amp; drop a photo</text>

  <!-- ========== BOTTOM TAB BAR ========== -->
  <rect x="0" y="730" width="375" height="82" fill="#0f172a"/>
  <line x1="0" y1="730" x2="375" y2="730" stroke="#1e293b" stroke-width="1"/>

  <!-- History tab -->
  <g transform="translate(65,750)">
    <!-- Clock icon -->
    <circle cx="12" cy="11" r="9" fill="none" stroke="#64748b" stroke-width="1.8"/>
    <polyline points="12,6 12,11 15,13" fill="none" stroke="#64748b" stroke-width="1.8"/>
    <text x="12" y="32" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#64748b">History</text>
  </g>

  <!-- Scan tab (active/primary) -->
  <g transform="translate(175,744)">
    <rect x="-12" y="-4" width="50" height="48" rx="16" fill="#22d3ee11"/>
    <!-- Scan icon -->
    <g stroke="#22d3ee" stroke-width="2" fill="none" transform="translate(1,0)">
      <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
      <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
      <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
      <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
    </g>
    <text x="13" y="38" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#22d3ee" font-weight="700">Scan</text>
  </g>

  <!-- Budget tab -->
  <g transform="translate(285,750)">
    <!-- Chart icon -->
    <g stroke="#64748b" stroke-width="1.8" fill="none">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
      <line x1="2" y1="20" x2="22" y2="20"/>
    </g>
    <text x="12" y="32" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#64748b">Budget</text>
  </g>
</svg>