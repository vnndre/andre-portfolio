<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .title { font-size: 28px; fill: #1a1a2e; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; fill: #64748b; }
    .node-label { font-size: 13px; fill: #f1f5f9; font-weight: 600; text-anchor: middle; }
    .node-desc { font-size: 10px; fill: #94a3b8; text-anchor: middle; }
    .arrow-label { font-size: 10px; fill: #475569; font-style: italic; }
    .section-label { font-size: 11px; fill: #22d3ee; font-weight: 700; letter-spacing: 1.5px; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">CartLog User Flow</text>
  <text x="600" y="72" text-anchor="middle" class="subtitle">How a user moves through the receipt scanning and budget tracking app</text>

  <!-- ========== ENTRY POINT ========== -->
  <circle cx="600" cy="130" r="24" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="600" y="135" class="node-label" font-size="11">OPEN APP</text>

  <!-- Arrow down to tab bar -->
  <line x1="600" y1="154" x2="600" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="615" y="178" class="arrow-label">defaults to Scan tab</text>

  <!-- ========== TAB BAR (central hub) ========== -->
  <rect x="340" y="195" width="520" height="50" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="186" class="section-label">BOTTOM TAB BAR</text>

  <!-- History tab -->
  <rect x="360" y="203" width="130" height="34" rx="10" fill="#1e293b"/>
  <text x="425" y="225" class="node-label" font-size="12">History</text>

  <!-- Scan tab (primary) -->
  <rect x="510" y="200" width="130" height="40" rx="12" fill="#22d3ee"/>
  <text x="575" y="225" font-size="13" fill="#0f172a" font-weight="700" text-anchor="middle">Scan</text>

  <!-- Budget tab -->
  <rect x="660" y="203" width="130" height="34" rx="10" fill="#1e293b"/>
  <text x="725" y="225" class="node-label" font-size="12">Budget</text>

  <!-- ========== SCAN FLOW (center) ========== -->
  <line x1="575" y1="240" x2="575" y2="290" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>

  <!-- Scan idle -->
  <rect x="475" y="295" width="200" height="55" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="575" y="318" class="node-label">Scan Screen (idle)</text>
  <text x="575" y="335" class="node-desc">Upload zone + drag &amp; drop</text>

  <!-- Tap/drag -->
  <line x1="575" y1="350" x2="575" y2="390" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="590" y="378" class="arrow-label">tap or drop image</text>

  <!-- Confirm -->
  <rect x="475" y="395" width="200" height="55" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="575" y="418" class="node-label">Confirm Receipt</text>
  <text x="575" y="435" class="node-desc">Preview + quality checklist</text>

  <!-- Fork: Retake or Submit -->
  <line x1="510" y1="450" x2="440" y2="490" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="5"/>
  <text x="440" y="475" class="arrow-label" fill="#f87171">retake</text>

  <line x1="575" y1="450" x2="575" y2="490" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="590" y="478" class="arrow-label" fill="#22d3ee">looks good</text>

  <!-- Retake loops back -->
  <path d="M 440 490 L 440 320 L 475 320" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrowhead)"/>

  <!-- Scanning -->
  <rect x="475" y="495" width="200" height="55" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="575" y="518" class="node-label">Scanning...</text>
  <text x="575" y="535" class="node-desc">Upload → OCR → Save (progress bar)</text>

  <!-- Fork: Success or Error -->
  <line x1="575" y1="550" x2="575" y2="590" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="590" y="578" class="arrow-label" fill="#4ade80">success</text>

  <line x1="675" y1="530" x2="740" y2="530" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="700" y="522" class="arrow-label" fill="#f87171">error</text>

  <!-- Success -->
  <rect x="490" y="595" width="170" height="50" rx="14" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="575" y="618" class="node-label" fill="#4ade80">Receipt Saved ✓</text>
  <text x="575" y="633" class="node-desc">Scan another option</text>

  <!-- Error -->
  <rect x="745" y="510" width="150" height="45" rx="14" fill="#0f172a" stroke="#f87171" stroke-width="1.5"/>
  <text x="820" y="530" class="node-label" fill="#f87171">Scan Failed</text>
  <text x="820" y="545" class="node-desc">Try again option</text>

  <!-- Error retry loops back -->
  <path d="M 820 555 L 820 600 L 700 600 L 700 320 L 675 320" fill="none" stroke="#f87171" stroke-width="1.2" stroke-dasharray="5" marker-end="url(#arrowhead)"/>
  <text x="770" y="595" class="arrow-label" fill="#f87171">retry</text>

  <!-- ========== HISTORY FLOW (left) ========== -->
  <line x1="425" y1="237" x2="200" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- History list -->
  <rect x="80" y="315" width="240" height="55" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="338" class="node-label">Receipt List</text>
  <text x="200" y="355" class="node-desc">Grouped by month, sortable, exportable</text>

  <!-- Tap receipt -->
  <line x1="200" y1="370" x2="200" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="215" y="398" class="arrow-label">tap receipt</text>

  <!-- Receipt detail -->
  <rect x="80" y="415" width="240" height="55" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="438" class="node-label">Receipt Detail</text>
  <text x="200" y="455" class="node-desc">Items list with categories &amp; prices</text>

  <!-- Actions from detail -->
  <line x1="200" y1="470" x2="120" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="120" y="498" class="arrow-label">edit category</text>

  <line x1="200" y1="470" x2="280" y2="510" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="270" y="498" class="arrow-label" fill="#f87171">delete</text>

  <!-- Edit category -->
  <rect x="40" y="515" width="160" height="45" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="120" y="535" class="node-label" font-size="11">Category Picker</text>
  <text x="120" y="550" class="node-desc">15 color-coded categories</text>

  <!-- Delete confirm -->
  <rect x="220" y="515" width="140" height="45" rx="12" fill="#0f172a" stroke="#f87171" stroke-width="1"/>
  <text x="290" y="535" class="node-label" font-size="11" fill="#f87171">Confirm Delete</text>
  <text x="290" y="550" class="node-desc">Modal dialog</text>

  <!-- Back button from detail -->
  <path d="M 80 440 L 50 440 L 50 330 L 80 330" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="32" y="385" class="arrow-label" transform="rotate(-90,32,385)">back</text>

  <!-- ========== BUDGET FLOW (right) ========== -->
  <line x1="725" y1="237" x2="980" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Budget dashboard -->
  <rect x="860" y="315" width="240" height="55" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="980" y="338" class="node-label">Budget Dashboard</text>
  <text x="980" y="355" class="node-desc">Donut chart + category bars</text>

  <!-- Month/All toggle -->
  <rect x="900" y="280" width="160" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="980" y="298" class="node-desc" fill="#94a3b8">By Month ↔ All Time</text>

  <!-- Tap category -->
  <line x1="980" y1="370" x2="980" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="995" y="398" class="arrow-label">tap category slice or bar</text>

  <!-- Category trend -->
  <rect x="860" y="415" width="240" height="55" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="980" y="438" class="node-label">Category Trend</text>
  <text x="980" y="455" class="node-desc">Monthly bar chart + item list</text>

  <!-- Tap month bar -->
  <line x1="980" y1="470" x2="980" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="995" y="498" class="arrow-label">tap month bar</text>

  <!-- Month items -->
  <rect x="880" y="515" width="200" height="45" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="980" y="535" class="node-label" font-size="11">Month's Items</text>
  <text x="980" y="550" class="node-desc">With inline category editing</text>

  <!-- Back from trend -->
  <path d="M 860 440 L 830 440 L 830 340 L 860 340" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="812" y="390" class="arrow-label" transform="rotate(-90,812,390)">back</text>

  <!-- ========== LEGEND ========== -->
  <rect x="40" y="720" width="340" height="150" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="748" font-size="14" fill="#1e293b" font-weight="700">Legend</text>

  <line x1="60" y1="770" x2="100" y2="770" stroke="#22d3ee" stroke-width="2"/>
  <text x="110" y="775" font-size="11" fill="#64748b">Primary / happy path</text>

  <line x1="60" y1="795" x2="100" y2="795" stroke="#475569" stroke-width="1.5"/>
  <text x="110" y="800" font-size="11" fill="#64748b">Navigation flow</text>

  <line x1="60" y1="820" x2="100" y2="820" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="110" y="825" font-size="11" fill="#64748b">Error / destructive path</text>

  <line x1="60" y1="845" x2="100" y2="845" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4"/>
  <text x="110" y="850" font-size="11" fill="#64748b">Back / return navigation</text>

  <!-- Data flow note -->
  <rect x="440" y="720" width="340" height="80" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="460" y="748" font-size="14" fill="#1e293b" font-weight="700">Data Flow</text>
  <text x="460" y="770" font-size="11" fill="#64748b">Scan → Supabase Storage → /api/scan (OCR)</text>
  <text x="460" y="787" font-size="11" fill="#64748b">→ Supabase DB (receipts + items tables)</text>

  <!-- Tech stack note -->
  <rect x="840" y="720" width="320" height="80" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="860" y="748" font-size="14" fill="#1e293b" font-weight="700">Tech Stack</text>
  <text x="860" y="770" font-size="11" fill="#64748b">React + Vite · Supabase (DB + Storage)</text>
  <text x="860" y="787" font-size="11" fill="#64748b">Vercel (Hosting) · OCR API (receipt parsing)</text>
</svg>