<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="40%" stop-color="#2a1530"/>
      <stop offset="70%" stop-color="#4a2040"/>
      <stop offset="100%" stop-color="#c85a30"/>
    </linearGradient>
    <filter id="neonExt">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="neonSign" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a44a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8a44a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky — dusk/sunset -->
  <rect width="1200" height="675" fill="url(#skyGrad)"/>

  <!-- Ground / parking lot -->
  <rect x="0" y="420" width="1200" height="255" fill="#1a1610"/>
  <!-- Gravel texture -->
  <circle cx="100" cy="500" r="1" fill="#2a2418" opacity="0.6"/>
  <circle cx="250" cy="480" r="1.5" fill="#2a2418" opacity="0.5"/>
  <circle cx="400" cy="520" r="1" fill="#2a2418" opacity="0.6"/>
  <circle cx="550" cy="490" r="1.5" fill="#2a2418" opacity="0.5"/>
  <circle cx="700" cy="510" r="1" fill="#2a2418" opacity="0.6"/>
  <circle cx="850" cy="530" r="1" fill="#2a2418" opacity="0.5"/>
  <circle cx="1000" cy="485" r="1.5" fill="#2a2418" opacity="0.6"/>

  <!-- ========== BUILDING ========== -->
  <!-- Main structure -->
  <rect x="200" y="180" width="800" height="240" fill="#2a2218"/>
  <rect x="200" y="180" width="800" height="240" fill="#1e1a12" opacity="0.5"/>

  <!-- Corrugated roof -->
  <polygon points="150,180 1050,180 1100,150 100,150" fill="#2a2015"/>
  <polygon points="100,150 1100,150 1080,145 120,145" fill="#3a3020"/>
  <!-- Roof ridges -->
  <line x1="100" y1="150" x2="1100" y2="150" stroke="#3a2e18" stroke-width="1"/>
  <line x1="120" y1="148" x2="1080" y2="148" stroke="#4a3e28" stroke-width="0.5"/>

  <!-- Front wall texture — wooden slats -->
  <line x1="200" y1="200" x2="1000" y2="200" stroke="#2a2418" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="220" x2="1000" y2="220" stroke="#2a2418" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="240" x2="1000" y2="240" stroke="#2a2418" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="260" x2="1000" y2="260" stroke="#2a2418" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="280" x2="1000" y2="280" stroke="#2a2418" stroke-width="0.5" opacity="0.5"/>

  <!-- ========== NEON SIGN (centered on building) ========== -->
  <rect x="350" y="190" width="500" height="100" rx="8" fill="#1a1410"/>
  <rect x="350" y="190" width="500" height="100" rx="8" fill="url(#neonSign)"/>
  <rect x="350" y="190" width="500" height="100" rx="8" fill="none" stroke="#c8a44a" stroke-width="2" opacity="0.4"/>

  <!-- Neon text -->
  <text x="600" y="235" text-anchor="middle" font-family="serif" font-size="38" fill="#c8a44a" font-weight="700" font-style="italic" filter="url(#neonExt)">THE BROKEN SPOKE</text>
  <text x="600" y="265" text-anchor="middle" font-family="serif" font-size="14" fill="#c8a44a" opacity="0.7" letter-spacing="6" filter="url(#neonExt)">DANCE HALL &amp; SALOON</text>

  <!-- Door (center) -->
  <rect x="555" y="310" width="90" height="110" rx="2" fill="#0a0804"/>
  <rect x="560" y="315" width="80" height="100" fill="#1a1208"/>
  <!-- Door handle -->
  <circle cx="630" cy="370" r="3" fill="#c8a44a" opacity="0.6"/>
  <!-- Light spilling from door -->
  <polygon points="555,420 555,310 520,420" fill="#c8a44a" opacity="0.03"/>
  <polygon points="645,420 645,310 680,420" fill="#c8a44a" opacity="0.03"/>

  <!-- Windows -->
  <rect x="300" y="300" width="80" height="60" fill="#2a1e10"/>
  <rect x="305" y="305" width="70" height="50" fill="#1a1208"/>
  <rect x="305" y="305" width="70" height="50" fill="#c8a44a" opacity="0.05"/>
  <line x1="340" y1="305" x2="340" y2="355" stroke="#3a2e18" stroke-width="1"/>

  <rect x="820" y="300" width="80" height="60" fill="#2a1e10"/>
  <rect x="825" y="305" width="70" height="50" fill="#1a1208"/>
  <rect x="825" y="305" width="70" height="50" fill="#c8a44a" opacity="0.05"/>
  <line x1="860" y1="305" x2="860" y2="355" stroke="#3a2e18" stroke-width="1"/>

  <!-- Side extensions -->
  <rect x="100" y="200" width="100" height="220" fill="#1e1a12"/>
  <rect x="1000" y="200" width="100" height="220" fill="#1e1a12"/>

  <!-- Porch overhang -->
  <rect x="250" y="300" width="700" height="8" fill="#2a2418"/>

  <!-- Porch posts -->
  <rect x="300" y="300" width="6" height="120" fill="#2a2015"/>
  <rect x="500" y="300" width="6" height="120" fill="#2a2015"/>
  <rect x="694" y="300" width="6" height="120" fill="#2a2015"/>
  <rect x="894" y="300" width="6" height="120" fill="#2a2015"/>

  <!-- String lights across porch -->
  <path d="M 300 310 Q 400 325 500 310" fill="none" stroke="#c8a44a" stroke-width="0.5" opacity="0.4"/>
  <circle cx="350" cy="318" r="2" fill="#c8a44a" opacity="0.5" filter="url(#neonExt)"/>
  <circle cx="400" cy="322" r="2" fill="#c8a44a" opacity="0.4" filter="url(#neonExt)"/>
  <circle cx="450" cy="318" r="2" fill="#c8a44a" opacity="0.5" filter="url(#neonExt)"/>

  <path d="M 500 310 Q 600 325 700 310" fill="none" stroke="#c8a44a" stroke-width="0.5" opacity="0.4"/>
  <circle cx="550" cy="318" r="2" fill="#c8a44a" opacity="0.5" filter="url(#neonExt)"/>
  <circle cx="600" cy="322" r="2" fill="#c8a44a" opacity="0.4" filter="url(#neonExt)"/>
  <circle cx="650" cy="318" r="2" fill="#c8a44a" opacity="0.5" filter="url(#neonExt)"/>

  <path d="M 700 310 Q 800 325 900 310" fill="none" stroke="#c8a44a" stroke-width="0.5" opacity="0.4"/>
  <circle cx="750" cy="318" r="2" fill="#c8a44a" opacity="0.5" filter="url(#neonExt)"/>
  <circle cx="800" cy="322" r="2" fill="#c8a44a" opacity="0.4" filter="url(#neonExt)"/>
  <circle cx="850" cy="318" r="2" fill="#c8a44a" opacity="0.5" filter="url(#neonExt)"/>

  <!-- ========== LAPENTOR HOTSPOT OVERLAYS ========== -->

  <!-- Hotspot: Front entrance -->
  <g transform="translate(600,370)" filter="url(#neonExt)">
    <circle r="16" fill="#a78bfa" opacity="0.2"/>
    <circle r="9" fill="#a78bfa" opacity="0.5"/>
    <circle r="4.5" fill="white" opacity="0.9"/>
    <text x="0" y="-24" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="600">ENTER VENUE</text>
  </g>

  <!-- Hotspot: Neon sign history -->
  <g transform="translate(820,240)" filter="url(#neonExt)">
    <circle r="12" fill="#a78bfa" opacity="0.2"/>
    <circle r="7" fill="#a78bfa" opacity="0.5"/>
    <circle r="3.5" fill="white" opacity="0.9"/>
  </g>
  <!-- Info tooltip for sign -->
  <rect x="840" y="215" width="200" height="50" rx="8" fill="#1a1028" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
  <text x="855" y="233" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="600">NEON SIGNAGE</text>
  <text x="855" y="250" font-family="sans-serif" font-size="9" fill="#b0a090">Original sign — installed 1964, still</text>
  <text x="855" y="262" font-family="sans-serif" font-size="9" fill="#b0a090">lighting up South Lamar nightly</text>

  <!-- Hotspot: Parking lot / exterior context -->
  <g transform="translate(200,500)" filter="url(#neonExt)">
    <circle r="12" fill="#a78bfa" opacity="0.2"/>
    <circle r="7" fill="#a78bfa" opacity="0.5"/>
    <circle r="3.5" fill="white" opacity="0.9"/>
    <text x="0" y="-18" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a78bfa" font-weight="600">SOUTH LAMAR CONTEXT</text>
  </g>

  <!-- Navigation arrow to interior -->
  <g transform="translate(600,480)">
    <circle r="22" fill="#a78bfa" opacity="0.12"/>
    <circle r="15" fill="#a78bfa" opacity="0.25"/>
    <polygon points="9,-7 9,7 19,0" fill="white" opacity="0.8"/>
    <text x="0" y="32" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa">ENTER →</text>
  </g>

  <!-- Modern condos in background (gentrification context) -->
  <rect x="1050" y="100" width="120" height="80" fill="#1a1828" opacity="0.6"/>
  <rect x="1055" y="110" width="15" height="12" fill="#2a2838" opacity="0.5"/>
  <rect x="1075" y="110" width="15" height="12" fill="#22d3ee" opacity="0.03"/>
  <rect x="1095" y="110" width="15" height="12" fill="#2a2838" opacity="0.5"/>
  <rect x="1055" y="128" width="15" height="12" fill="#22d3ee" opacity="0.03"/>
  <rect x="1075" y="128" width="15" height="12" fill="#2a2838" opacity="0.5"/>
  <rect x="1095" y="128" width="15" height="12" fill="#22d3ee" opacity="0.03"/>
  <rect x="1055" y="146" width="15" height="12" fill="#2a2838" opacity="0.5"/>
  <rect x="1075" y="146" width="15" height="12" fill="#2a2838" opacity="0.5"/>
  <rect x="1095" y="146" width="15" height="12" fill="#2a2838" opacity="0.5"/>

  <!-- ========== LAPENTOR TOOLBAR ========== -->
  <rect x="0" y="630" width="1200" height="45" fill="#000000" opacity="0.7"/>
  <rect x="0" y="630" width="1200" height="1" fill="#a78bfa" opacity="0.3"/>

  <text x="30" y="658" font-family="sans-serif" font-size="13" fill="#e8e0d0" font-weight="500">Exterior — South Lamar Blvd</text>

  <!-- Scene dots -->
  <g transform="translate(560,653)">
    <circle cx="0" cy="0" r="4" fill="#7a6e5e" opacity="0.5"/>
    <circle cx="16" cy="0" r="4" fill="#7a6e5e" opacity="0.5"/>
    <circle cx="32" cy="0" r="4" fill="#a78bfa"/>
    <circle cx="48" cy="0" r="4" fill="#7a6e5e" opacity="0.5"/>
    <circle cx="64" cy="0" r="4" fill="#7a6e5e" opacity="0.5"/>
  </g>

  <!-- Controls -->
  <rect x="1130" y="642" width="28" height="22" rx="4" fill="none" stroke="#7a6e5e" stroke-width="1.5"/>
  <circle cx="1100" cy="653" r="10" fill="none" stroke="#7a6e5e" stroke-width="1.5"/>
  <circle cx="1100" cy="653" r="3" fill="#7a6e5e"/>

  <!-- Tour title -->
  <rect x="0" y="0" width="400" height="50" fill="#000000" opacity="0.5"/>
  <text x="20" y="22" font-family="serif" font-size="14" fill="#c8a44a" font-weight="600">Story of Broken Spoke</text>
  <text x="20" y="40" font-family="monospace" font-size="10" fill="#7a6e5e" letter-spacing="1">PRESERVING AUSTIN CULTURE</text>

  <!-- 360 badge -->
  <g transform="translate(1140,25)">
    <circle r="18" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="700">360°</text>
  </g>
</svg>