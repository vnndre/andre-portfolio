<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <radialGradient id="dotGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pieGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#0a0f1e"/>

  <!-- Status bar -->
  <text x="30" y="26" font-family="SF Pro, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">9:41</text>

  <!-- Header -->
  <text x="24" y="68" font-family="Georgia, serif" font-size="22" fill="#f1f5f9">cart<tspan fill="#22d3ee">log</tspan></text>
  <circle cx="351" cy="62" r="12" fill="url(#dotGlow3)"/>
  <circle cx="351" cy="62" r="4" fill="#22d3ee"/>

  <!-- Budget title + export -->
  <text x="24" y="108" font-family="Georgia, serif" font-size="24" fill="#f1f5f9" font-weight="700">Budget</text>
  <rect x="285" y="90" width="68" height="30" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="319" y="110" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Export</text>

  <!-- Toggle: By Month / All Time -->
  <rect x="20" y="126" width="335" height="38" rx="12" fill="#1e293b"/>
  <rect x="24" y="130" width="163" height="30" rx="8" fill="#22d3ee"/>
  <text x="106" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0f172a" font-weight="600">By Month</text>
  <text x="270" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">All Time</text>

  <!-- Month navigation -->
  <rect x="24" y="178" width="32" height="32" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="40" y="199" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8">‹</text>

  <rect x="140" y="178" width="95" height="32" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="187" y="199" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e2e8f0" font-weight="600">Mar 2026</text>

  <rect x="319" y="178" width="32" height="32" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="335" y="199" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8">›</text>

  <!-- ========== DONUT PIE CHART ========== -->
  <!-- Glow behind -->
  <circle cx="187" cy="330" r="100" fill="url(#pieGlow)"/>

  <!-- Pie segments as arcs (clockwise from top) -->
  <!-- Produce (green) ~28% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#4ade80" stroke-width="48"
    stroke-dasharray="165 426" stroke-dashoffset="148" opacity="0.95"/>

  <!-- Dairy (yellow) ~19% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#facc15" stroke-width="48"
    stroke-dasharray="112 479" stroke-dashoffset="-17" opacity="0.95"/>

  <!-- Meat (red) ~16% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#f87171" stroke-width="48"
    stroke-dasharray="95 496" stroke-dashoffset="-129" opacity="0.95"/>

  <!-- Frozen (blue) ~12% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#60a5fa" stroke-width="48"
    stroke-dasharray="71 520" stroke-dashoffset="-224" opacity="0.95"/>

  <!-- Beverages (teal) ~10% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#34d399" stroke-width="48"
    stroke-dasharray="59 532" stroke-dashoffset="-295" opacity="0.95"/>

  <!-- Snacks (pink) ~8% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#f472b6" stroke-width="48"
    stroke-dasharray="47 544" stroke-dashoffset="-354" opacity="0.95"/>

  <!-- Household (gray) ~7% -->
  <circle cx="187" cy="330" r="94" fill="none" stroke="#94a3b8" stroke-width="48"
    stroke-dasharray="42 549" stroke-dashoffset="-401" opacity="0.95"/>

  <!-- Inner circle (hole) -->
  <circle cx="187" cy="330" r="70" fill="#0a0f1e"/>

  <!-- Center text -->
  <text x="187" y="324" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#22d3ee" font-weight="700">$347.42</text>
  <text x="187" y="346" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">total spent</text>

  <!-- ========== CATEGORY BARS ========== -->
  <g transform="translate(0,420)">
    <!-- Produce -->
    <circle cx="34" cy="14" r="5" fill="#4ade80"/>
    <text x="48" y="18" font-family="sans-serif" font-size="14" fill="#cbd5e1">Produce</text>
    <text x="310" y="18" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$97.20</text>
    <text x="340" y="18" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="26" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="26" width="310" height="6" rx="3" fill="#4ade80" opacity="0.85"/>

    <!-- Dairy & Eggs -->
    <circle cx="34" cy="58" r="5" fill="#facc15"/>
    <text x="48" y="62" font-family="sans-serif" font-size="14" fill="#cbd5e1">Dairy &amp; Eggs</text>
    <text x="310" y="62" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$67.15</text>
    <text x="340" y="62" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="70" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="70" width="214" height="6" rx="3" fill="#facc15" opacity="0.85"/>

    <!-- Meat & Seafood -->
    <circle cx="34" cy="102" r="5" fill="#f87171"/>
    <text x="48" y="106" font-family="sans-serif" font-size="14" fill="#cbd5e1">Meat &amp; Seafood</text>
    <text x="310" y="106" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$55.80</text>
    <text x="340" y="106" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="114" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="114" width="178" height="6" rx="3" fill="#f87171" opacity="0.85"/>

    <!-- Frozen -->
    <circle cx="34" cy="146" r="5" fill="#60a5fa"/>
    <text x="48" y="150" font-family="sans-serif" font-size="14" fill="#cbd5e1">Frozen</text>
    <text x="310" y="150" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$42.10</text>
    <text x="340" y="150" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="158" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="158" width="134" height="6" rx="3" fill="#60a5fa" opacity="0.85"/>

    <!-- Beverages -->
    <circle cx="34" cy="190" r="5" fill="#34d399"/>
    <text x="48" y="194" font-family="sans-serif" font-size="14" fill="#cbd5e1">Beverages</text>
    <text x="310" y="194" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$38.27</text>
    <text x="340" y="194" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="202" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="202" width="122" height="6" rx="3" fill="#34d399" opacity="0.85"/>

    <!-- Snacks -->
    <circle cx="34" cy="234" r="5" fill="#f472b6"/>
    <text x="48" y="238" font-family="sans-serif" font-size="14" fill="#cbd5e1">Snacks</text>
    <text x="310" y="238" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$28.50</text>
    <text x="340" y="238" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="246" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="246" width="91" height="6" rx="3" fill="#f472b6" opacity="0.85"/>

    <!-- Household -->
    <circle cx="34" cy="278" r="5" fill="#94a3b8"/>
    <text x="48" y="282" font-family="sans-serif" font-size="14" fill="#cbd5e1">Household</text>
    <text x="310" y="282" text-anchor="end" font-family="sans-serif" font-size="14" fill="#f1f5f9" font-weight="600">$18.40</text>
    <text x="340" y="282" text-anchor="end" font-family="sans-serif" font-size="14" fill="#475569">›</text>
    <rect x="30" y="290" width="310" height="6" rx="3" fill="#1e293b"/>
    <rect x="30" y="290" width="59" height="6" rx="3" fill="#94a3b8" opacity="0.85"/>
  </g>

  <!-- ========== BOTTOM TAB BAR ========== -->
  <rect x="0" y="730" width="375" height="82" fill="#0f172a"/>
  <line x1="0" y1="730" x2="375" y2="730" stroke="#1e293b" stroke-width="1"/>

  <!-- History tab -->
  <g transform="translate(65,750)">
    <circle cx="12" cy="11" r="9" fill="none" stroke="#64748b" stroke-width="1.8"/>
    <polyline points="12,6 12,11 15,13" fill="none" stroke="#64748b" stroke-width="1.8"/>
    <text x="12" y="32" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">History</text>
  </g>

  <!-- Scan tab -->
  <g transform="translate(176,744)">
    <g stroke="#64748b" stroke-width="2" fill="none">
      <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
      <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
      <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
      <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
    </g>
    <text x="12" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">Scan</text>
  </g>

  <!-- Budget tab (active) -->
  <g transform="translate(285,750)">
    <g stroke="#22d3ee" stroke-width="1.8" fill="none">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
      <line x1="2" y1="20" x2="22" y2="20"/>
    </g>
    <text x="12" y="32" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#22d3ee" font-weight="700">Budget</text>
  </g>
</svg>